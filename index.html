<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Inteligencia emocional en el aula</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: #fff8dc;
      font-family: Arial, sans-serif;
      color: #003b8f;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 72px;
      background: rgba(255, 248, 220, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 1000;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .logo {
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      color: #004aad;
    }

    nav {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      color: #004aad;
    }

    nav a:hover {
      opacity: 0.7;
    }

    .btn {
      background: #004aad;
      color: white;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .site-frame {
      width: 100%;
      height: 100vh;
      padding-top: 72px;
    }

    .site-frame iframe {
      width: 100%;
      height: calc(100vh - 72px);
      border: none;
      display: block;
    }

    @media (max-width: 768px) {
      header {
        padding: 0 20px;
      }

      nav {
        gap: 14px;
      }

      nav a {
        font-size: 13px;
      }

      .logo {
        font-size: 16px;
      }

      .btn {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Inteligencia Emocional</div>

    <nav>
      <a href="#inicio">Inicio</a>
      <a href="https://angelasitio.my.canva.site/assess-damage" target="_blank">Ver sitio</a>
      <a href="#presentacion">Presentación</a>
      <a class="btn" href="https://angelasitio.my.canva.site/assess-damage" target="_blank">
        Abrir completo
      </a>
    </nav>
  </header>

  <main id="inicio" class="site-frame">
    <iframe
      id="presentacion"
      src="https://angelasitio.my.canva.site/assess-damage"
      allowfullscreen>
    </iframe>
  </main>
</body>
</html>
